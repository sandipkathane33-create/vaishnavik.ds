
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            display: block;
            transition: transform 0.5s ease;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, rgba(255,0,150,0.6), rgba(0,204,255,0.6));
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: opacity 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card:hover .overlay {
            opacity: 1;
        }
    </style>

</head>
<body>

    <h1>Image Gallery</h1>

    <div class="gallery">
        <div class="card">
            <img src="https://picsum.photos/id/1015/400/300">
            <div class="overlay">Mountain</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1025/400/300">
            <div class="overlay">Dog</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1035/400/300">
            <div class="overlay">River</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1045/400/300">
            <div class="overlay">Forest</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1055/400/300">
            <div class="overlay">Beach</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1065/400/300">
            <div class="overlay">Desert</div>
        </div>
    </div>

</body>
</html>
